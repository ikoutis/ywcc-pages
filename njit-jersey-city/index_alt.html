<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NJIT Jersey City</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #ffffff;
        --text: #0e1726;
        --muted: #56627a;
        --accent: #d71920;
        --cyan: #0c7fa6;
        --border: rgba(13, 22, 38, 0.14);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: Arial, Helvetica, sans-serif;
        -webkit-font-smoothing: antialiased;
      }

      a { color: inherit; }

      /* ---------------- HERO ---------------- */
      .hero {
        position: relative;
        min-height: 60vh;
        display: flex;
        align-items: center;
        overflow: hidden;
        background:
          radial-gradient(120% 120% at 78% -10%, #ffffff 0%, #eef2f8 60%, #e6ecf4 100%);
      }

      /* Light theme: no photo backdrop */
      .hero__photo { display: none; }
      .hero__scrim { display: none; }

      .hero::after {
        content: "";
        position: absolute;
        inset: auto 0 0;
        height: 5px;
        background: linear-gradient(90deg, var(--accent) 0%, var(--cyan) 50%, transparent 86%);
        z-index: 3;
      }

      /* NJIT logo — screen blend drops its dark backdrop so it sits on the scene */
      .hero__logo {
        position: absolute;
        top: clamp(18px, 3vw, 34px);
        left: clamp(16px, 3vw, 40px);
        z-index: 3;
        display: block;
        line-height: 0;
      }

      .hero__logo img {
        display: block;
        width: clamp(190px, 24vw, 300px);
        height: auto;
      }

      .hero__content {
        position: relative;
        z-index: 2;
        width: min(1180px, 100%);
        margin-inline: auto;
        padding: 150px 24px 60px;
      }

      .kicker {
        margin: 0 0 16px;
        color: var(--cyan);
        font-size: 0.82rem;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      /* White main message — single row, fluid so it always fits */
      .headline {
        margin: 0;
        white-space: nowrap;
        font-size: clamp(0.6rem, 3.6vw, 3.2rem);
        font-weight: 800;
        line-height: 1.05;
        letter-spacing: -0.01em;
        color: var(--text);
      }

      .headline .dot {
        color: var(--accent);
        margin: 0 0.26em;
        font-weight: 900;
      }

      .lede {
        max-width: 30ch;
        margin: 22px 0 0;
        color: var(--muted);
        font-size: clamp(1rem, 1.4vw, 1.18rem);
        line-height: 1.55;
      }

      /* Explore button graphic — screen blend removes its dark backdrop */
      .explore {
        display: inline-block;
        margin-top: 30px;
        line-height: 0;
        transition: transform 140ms ease, filter 140ms ease;
      }

      .explore img {
        display: block;
        width: clamp(280px, 34vw, 430px);
        height: auto;
      }

      .explore:hover,
      .explore:focus-visible {
        transform: translateY(-2px);
        filter: brightness(1.1);
        outline: none;
      }

      /* ---------------- PROGRAM TILES ---------------- */
      .programs {
        width: min(1180px, 100%);
        margin-inline: auto;
        padding: 56px 24px 84px;
      }

      .programs__kicker {
        margin: 0 0 22px;
        color: var(--cyan);
        font-size: 0.82rem;
        font-weight: 800;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .tiles {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 16px;
      }

      /* Each tile is a finished square graphic (icon + label baked in) */
      .tile {
        display: block;
        aspect-ratio: 1 / 1;
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
        line-height: 0;
        box-shadow: 0 8px 22px rgba(13, 22, 38, 0.10);
        transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
      }

      .tile img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .tile:hover,
      .tile:focus-visible {
        transform: translateY(-5px);
        border-color: rgba(13, 22, 38, 0.25);
        box-shadow: 0 18px 36px rgba(13, 22, 38, 0.20);
        outline: none;
      }

      /* ---------------- RESPONSIVE ---------------- */
      @media (max-width: 900px) {
        .tiles { grid-template-columns: 1fr 1fr; }
      }

      @media (max-width: 720px) {
        .hero {
          min-height: 54vh;
          align-items: center;
        }

        .hero__content { padding: 92px 18px 40px; }
        .hero__logo img { width: clamp(168px, 46vw, 210px); }

        /* Keep one row on phones, sized up to fill the width (larger than the
           original, while still fitting the longest line at ~320px) */
        .headline { font-size: clamp(0.8rem, 4.4vw, 2.2rem); }
      }

      @media (max-width: 560px) {
        .hero__content { padding-left: 16px; padding-right: 16px; }
        .programs { padding: 42px 16px 64px; }
        .tiles { gap: 12px; }
      }
    </style>
  </head>
  <body>

    <header class="hero">
      <div class="hero__photo" aria-hidden="true"></div>
      <div class="hero__scrim" aria-hidden="true"></div>

      <a class="hero__logo" href="about-njit/" aria-label="NJIT — New Jersey Institute of Technology">
        <img src="assets/image-parts/tile-njit-logo-dark.png" alt="NJIT — New Jersey Institute of Technology">
      </a>

      <div class="hero__content">
        <p class="kicker">NJIT Jersey City</p>
        <h1 class="headline"><span class="term">AI<span class="dot">&bull;</span></span><span class="term">Cybersecurity<span class="dot">&bull;</span></span><span class="term">Hyperscaling</span></h1>
        <p class="lede">Graduate programs at the edge of industry, in the heart of Jersey City.</p>
        <a class="explore" href="jersey-city/" aria-label="Explore NJIT in Jersey City">
          <img src="assets/image-parts/tile-explore-cut.png" alt="Explore NJIT in Jersey City">
        </a>
      </div>
    </header>

    <main class="programs">
      <p class="programs__kicker">Explore programs</p>
      <nav class="tiles" aria-label="Program areas">
        <a class="tile" href="artificial-intelligence/">
          <img src="assets/image-parts/tile-ai.png" alt="Artificial Intelligence" loading="lazy">
        </a>
        <a class="tile" href="cybersecurity/">
          <img src="assets/image-parts/tile-cybersecurity.png" alt="Cybersecurity" loading="lazy">
        </a>
        <a class="tile" href="hyperscale-computing/">
          <img src="assets/image-parts/tile-hyperscale.png" alt="Hyperscale Computing" loading="lazy">
        </a>
        <a class="tile" href="emerging-technologies/">
          <img src="assets/image-parts/tile-emerging.png" alt="Emerging Technologies" loading="lazy">
        </a>
      </nav>
    </main>

  </body>
</html>
